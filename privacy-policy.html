  <style>
    /* Variables de color basadas en tu diseño */
    :root {
        --primary-orange: #f26b27; /* Naranja All Door Tech */
        --card-bg: rgba(255, 255, 255, 0.03); /* Fondo sutil de las tarjetas */
        --border-color: rgba(255, 255, 255, 0.08);
        --text-muted: rgba(255, 255, 255, 0.7);
    }

    /* Contenedor principal */
    .pp-content {
        max-width: 1000px;
        margin: 60px auto;
        padding: 0 20px;
        color: #ffffff;
        font-family: 'Montserrat', sans-serif;
    }

    /* Estilos globales de las tarjetas */
    .summary-card, .section-card, .contact-card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 35px;
        margin-bottom: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    /* Tarjeta de Resumen (Grid) */
    .summary-card__title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 15px;
    }
    .summary-card__title i { color: var(--primary-orange); }

    .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
    }

    .summary-item {
        display: flex;
        gap: 15px;
        align-items: flex-start;
    }
    .summary-item .s-icon {
        font-size: 1.8rem;
        color: var(--primary-orange);
        background: rgba(242, 107, 39, 0.1);
        padding: 10px;
        border-radius: 8px;
    }
    .summary-item strong {
        display: block;
        font-size: 1.05rem;
        margin-bottom: 5px;
    }
    .summary-item p {
        margin: 0;
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.5;
    }

    /* Cabecera de Secciones Numeradas */
    .section-card-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 15px;
    }
    .section-num {
        background-color: var(--primary-orange);
        color: #fff;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-weight: 800;
        font-size: 1.1rem;
        flex-shrink: 0;
    }
    .section-card-header h2 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 600;
    }

    /* Contenido de las Secciones */
    .section-card-body h3 {
        font-size: 1.15rem;
        margin: 25px 0 15px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff;
    }
    .section-card-body h3 i { color: var(--primary-orange); }
    .section-card-body p, .section-card-body ul {
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 15px;
    }
    .section-card-body ul { padding-left: 20px; }
    .section-card-body li { margin-bottom: 8px; }

    /* Cajas destacadas (Highlight boxes) */
    .highlight-box {
        background-color: rgba(242, 107, 39, 0.08);
        border-left: 4px solid var(--primary-orange);
        padding: 18px 20px;
        border-radius: 0 8px 8px 0;
        display: flex;
        gap: 15px;
        align-items: flex-start;
        margin: 20px 0;
    }
    .highlight-box i {
        color: var(--primary-orange);
        font-size: 1.3rem;
    }
    .highlight-box span {
        font-size: 0.95rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.9);
    }

    /* Tabla de Derechos */
    .rights-table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        font-size: 0.9rem;
    }
    .rights-table th, .rights-table td {
        border: 1px solid var(--border-color);
        padding: 12px 15px;
        text-align: left;
    }
    .rights-table th { background-color: rgba(255,255,255,0.05); }
    .rights-table td { color: var(--text-muted); }
    .badge-yes { background-color: #2e7d32; padding: 4px 8px; border-radius: 4px; color: white; font-weight: 600; font-size: 0.8rem;}
    .badge-no { background-color: #c62828; padding: 4px 8px; border-radius: 4px; color: white; font-weight: 600; font-size: 0.8rem;}

    /* Tarjeta de Contacto */
    .contact-card {
        display: flex;
        gap: 25px;
        align-items: center;
    }
    .contact-card__icon i {
        font-size: 3rem;
        color: var(--primary-orange);
    }
    .contact-info {
        display: flex;
        gap: 20px;
        margin-top: 15px;
    }
    .contact-info a {
        color: var(--primary-orange);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.3s ease;
    }
    .contact-info a:hover { opacity: 0.8; }

    /* Adaptabilidad móvil */
    @media (max-width: 768px) {
        .contact-card { flex-direction: column; text-align: center; align-items: center; }
        .contact-info { flex-direction: column; gap: 10px; }
        .summary-card, .section-card, .contact-card { padding: 20px; }
        .highlight-box { flex-direction: column; gap: 10px; }
